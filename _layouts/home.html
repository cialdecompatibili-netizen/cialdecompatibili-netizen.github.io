---
layout: default
---
<style>
.lx * { box-sizing: border-box; margin: 0; padding: 0; }

/* SLIDER */
.lx-slider { position: relative; width: 100%; height: 500px; overflow: hidden; background: #f5f5f3; }
.lx-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.8s ease; }
.lx-slide.active { opacity: 1; }
.lx-slide-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.lx-slide-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.58); }
.lx-slide-content { position: relative; text-align: center; padding: 2rem; }
.lx-slide-eyebrow { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #aaa; margin-bottom: 1rem; }
.lx-slide-title { font-size: 48px; font-weight: 300; line-height: 1.1; letter-spacing: -0.03em; color: #111; margin-bottom: 0.75rem; }
.lx-slide-title em { font-style: italic; color: #888; }
.lx-slide-sub { font-size: 13px; color: #999; letter-spacing: 0.06em; }

/* SLIDER CONTROLS */
.lx-dots { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
.lx-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; cursor: pointer; transition: background 0.3s; border: none; padding: 0; }
.lx-dot.active { background: #111; }
.lx-arrows { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; display: flex; justify-content: space-between; padding: 0 1.5rem; pointer-events: none; }
.lx-arrow { width: 38px; height: 38px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: all; background: rgba(255,255,255,0.85); font-size: 15px; color: #555; line-height: 1; }

/* DESCRIPTION */
.lx-desc { padding: 4.5rem 2rem; text-align: center; border-bottom: 0.5px solid #e8e8e8; }
.lx-desc-inner { max-width: 580px; margin: 0 auto; }
.lx-desc-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #bbb; margin-bottom: 1.25rem; }
.lx-desc-title { font-size: 30px; font-weight: 400; line-height: 1.3; letter-spacing: -0.02em; color: #111; margin-bottom: 1rem; }
.lx-desc-text { font-size: 15px; color: #777; line-height: 1.85; margin-bottom: 2rem; }
.lx-desc-cta { display: inline-flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; border-bottom: 0.5px solid #111; padding-bottom: 4px; color: #111; text-decoration: none; }
.lx-desc-cta:hover { opacity: 0.6; }

/* 3 STEPS */
.lx-steps { display: grid; grid-template-columns: repeat(3, 1fr); }
.lx-step { padding: 2.5rem 2.5rem; border-right: 0.5px solid #e8e8e8; }
.lx-step:last-child { border-right: none; }
.lx-step-num { font-size: 11px; letter-spacing: 0.15em; color: #ccc; margin-bottom: 1.5rem; }
.lx-step-icon { width: 34px; height: 34px; border: 0.5px solid #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
.lx-step-icon svg { width: 14px; height: 14px; stroke: #888; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.lx-step-title { font-size: 15px; font-weight: 500; color: #111; margin-bottom: 0.6rem; line-height: 1.3; }
.lx-step-desc { font-size: 13px; color: #888; line-height: 1.75; }

@media (max-width: 720px) {
  .lx-slide-title { font-size: 32px; }
  .lx-slider { height: 380px; }
  .lx-steps { grid-template-columns: 1fr; }
  .lx-step { border-right: none; border-bottom: 0.5px solid #e8e8e8; }
  .lx-step:last-child { border-bottom: none; }
}
</style>

<div class="lx">
{{ content }}
</div><!-- .lx -->

<script>
var lxCur = 0;
var lxSlides = document.querySelectorAll('.lx-slide');
var lxDots = document.querySelectorAll('.lx-dot');
function lxGo(n) {
  lxSlides[lxCur].classList.remove('active');
  lxDots[lxCur].classList.remove('active');
  lxCur = (n + lxSlides.length) % lxSlides.length;
  lxSlides[lxCur].classList.add('active');
  lxDots[lxCur].classList.add('active');
}
function lxSlide(d) { lxGo(lxCur + d); }
setInterval(function(){ lxSlide(1); }, 4500);
</script>

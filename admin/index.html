---
layout: none
permalink: /admin/
---
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#222;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#1a1a2e;color:white;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;letter-spacing:.3px}
.topbar-link{color:rgba(255,255,255,.7);text-decoration:none;font-size:12px;display:flex;align-items:center;gap:5px}
.topbar-link:hover{color:white}
.layout{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}
.sidebar{width:200px;background:#1e2130;position:fixed;top:52px;bottom:0;padding:16px 0;overflow-y:auto}
.nav-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:16px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.07);color:white}
.nav-item.active{background:rgba(108,99,255,.25);color:#a89fff;border-left:3px solid #6c63ff}
.nav-item .icon{font-size:15px;width:20px;text-align:center}
.main{margin-left:200px;padding:28px;flex:1;max-width:860px}
.page{display:none}.page.active{display:block}
.page-title{font-size:20px;font-weight:700;margin-bottom:20px;color:#1a1a2e}
.card{background:white;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.field{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
input[type=text],input[type=date],input[type=password],select,textarea{width:100%;padding:8px 11px;border:1.5px solid #e8e8e8;border-radius:7px;font-size:13px;font-family:inherit;background:#fafafa;color:#222;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#6c63ff;background:#fff}
textarea.md{min-height:280px;font-family:'Courier New',monospace;font-size:13px;line-height:1.8;resize:vertical}
textarea.sm{min-height:180px;font-family:'Courier New',monospace;font-size:13px;line-height:1.8;resize:vertical}
.hint{font-size:11px;color:#bbb;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#6c63ff;color:white}.btn-primary:hover{background:#5a52e0}
.btn-secondary{background:#f0f0f0;color:#444}.btn-secondary:hover{background:#e5e5e5}
.btn-danger{background:#fde8e8;color:#c0392b}.btn-danger:hover{background:#fbd0d0}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:4px}
.msg{font-size:12px;padding:7px 12px;border-radius:6px;display:none;margin-top:8px}
.msg.ok{background:#e6f9f0;color:#1a7a4a;display:block}
.msg.err{background:#fde8e8;color:#c0392b;display:block}
.token-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:18px 20px;margin-bottom:16px}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.list-row:last-child{border-bottom:none}
.cat-row{background:#f8f8ff;border:1px solid #e8e8ff;border-radius:8px;padding:12px;margin-bottom:8px}
.menu-row{background:#f8fff8;border:1px solid #d0efd0;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;gap:8px;align-items:center}
.menu-row input{margin:0;flex:1}
.badge{font-size:11px;background:#6c63ff;color:white;padding:2px 8px;border-radius:10px}
.editor-toggle{display:flex;gap:0;margin-bottom:6px}
.editor-toggle button{padding:5px 14px;font-size:12px;font-weight:600;border:1.5px solid #e8e8e8;background:#f5f5f5;color:#888;cursor:pointer;transition:all .15s}
.editor-toggle button:first-child{border-radius:6px 0 0 6px}
.editor-toggle button:last-child{border-radius:0 6px 6px 0;border-left:none}
.editor-toggle button.active{background:#6c63ff;color:white;border-color:#6c63ff}
#quill-box .ql-toolbar{border-radius:7px 7px 0 0;border-color:#e8e8e8}
#quill-box .ql-container{border-radius:0 0 7px 7px;border-color:#e8e8e8;min-height:260px;font-size:14px;line-height:1.8}
.vis-toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border:1.5px solid #e8e8e8;border-bottom:none;border-radius:7px 7px 0 0;background:#f9f9f9}
.vis-toolbar button{padding:4px 10px;border:1.5px solid #e8e8e8;border-radius:5px;background:white;font-size:13px;cursor:pointer;color:#444;font-family:inherit;transition:all .12s}
.vis-toolbar button:hover{background:#6c63ff;color:white;border-color:#6c63ff}
.vis-toolbar .sep{width:1px;background:#e0e0e0;margin:2px 2px}
.vis-editor{min-height:260px;padding:12px;border:1.5px solid #e8e8e8;border-radius:0 0 7px 7px;font-size:14px;line-height:1.8;outline:none;background:#fff;overflow-y:auto}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat-box{background:white;border-radius:10px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
.stat-num{font-size:32px;font-weight:800;color:#6c63ff}
.stat-label{font-size:11px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.quick-links{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.skin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.skin-opt{border:2px solid #e8e8e8;border-radius:8px;padding:8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.skin-opt:hover{border-color:#6c63ff}
.skin-opt.active{border-color:#6c63ff;background:#f0eeff;color:#6c63ff}
.draft-badge{font-size:10px;background:#fff3cd;color:#856404;border:1px solid #ffc107;padding:2px 7px;border-radius:8px;margin-left:6px;font-weight:600}
.tab-row{display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid #f0f0f0}
.tab-btn{padding:8px 18px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:#6c63ff;border-bottom-color:#6c63ff}
</head>
<body>

<div class="topbar">
  <span class="topbar-title">✍️ Admin</span>
  <a href="https://cialdecompatibili-netizen.github.io/" target="_blank" class="topbar-link">🌐 Vai al sito ↗</a>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-label">Generale</div>
    <button class="nav-item active" onclick="showPage('dashboard',this)"><span class="icon">🏠</span>Dashboard</button>
    <div class="nav-label">Contenuti</div>
    <button class="nav-item" onclick="showPage('articoli',this)"><span class="icon">📝</span>Articoli</button>
    <button class="nav-item" onclick="showPage('bozze',this)"><span class="icon">📋</span>Bozze</button>
    <button class="nav-item" onclick="showPage('pagine',this)"><span class="icon">📄</span>Pagine</button>
    <div class="nav-label">Impostazioni</div>
    <button class="nav-item" onclick="showPage('sito',this)"><span class="icon">⚙️</span>Sito</button>
    <button class="nav-item" onclick="showPage('menu',this)"><span class="icon">🧭</span>Menu</button>
    <button class="nav-item" onclick="showPage('categorie',this)"><span class="icon">🗂</span>Categorie</button>
    <button class="nav-item" onclick="showPage('token',this)"><span class="icon">🔑</span>Token</button>
  </nav>

  <main class="main">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="page-title">🏠 Dashboard</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" id="stat-art">—</div><div class="stat-label">Articoli</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-boz">—</div><div class="stat-label">Bozze</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-pag">—</div><div class="stat-label">Pagine</div></div>
      </div>
      <div class="quick-links">
        <button class="btn btn-primary" onclick="showPageById('articoli')">✚ Nuovo articolo</button>
        <button class="btn btn-secondary" onclick="showPageById('bozze')">📋 Vedi bozze</button>
        <button class="btn btn-secondary" onclick="showPageById('sito')">⚙️ Impostazioni sito</button>
        <a href="https://cialdecompatibili-netizen.github.io/" target="_blank" class="btn btn-secondary">🌐 Vai al sito</a>
      </div>
      <div class="card">
        <div class="card-title">Ultimi articoli pubblicati</div>
        <div id="dash-ultimi"><span style="color:#bbb;font-size:13px">⏳ Caricamento...</span></div>
      </div>
    </div>

    <!-- ARTICOLI -->
    <div class="page" id="page-articoli">
      <div class="page-title">📝 Articoli</div>
      <div class="card">
        <div class="card-title">Nuovo / Modifica articolo</div>
        <div class="field"><label>Titolo *</label><input type="text" id="titolo" placeholder="Titolo dell'articolo"></div>
        <div class="grid2">
          <div class="field"><label>Data</label><input type="date" id="data"></div>
          <div class="field">
            <label>Categoria *</label>
            <select id="categorie"><option value="">— Seleziona —</option></select>
          </div>
        </div>
        <div class="grid2">
          <div class="field"><label>Tag <span class="hint" style="display:inline">separati da virgola</span></label><input type="text" id="tags" placeholder="jekyll, web"></div>
          <div class="field">
            <label>Immagine teaser</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" id="teaser" placeholder="https://... oppure carica ↓">
              <label class="btn btn-secondary btn-sm" style="cursor:pointer;white-space:nowrap">📁 Carica<input type="file" id="upload-img" accept="image/*" style="display:none" onchange="uploadImmagine(this)"></label>
            </div>
            <div id="upload-progress" style="display:none;font-size:11px;color:#6c63ff;margin-top:4px">⏳ Caricamento immagine...</div>
            <div id="upload-preview" style="display:none;margin-top:8px"><img id="upload-preview-img" style="max-height:80px;border-radius:6px;border:1.5px solid #e8e8e8"></div>
          </div>
        </div>
        <div class="field"><label>Excerpt SEO</label><input type="text" id="excerpt" placeholder="Descrizione breve per Google (max 160 caratteri)"></div>
        <div class="field">
          <label>Contenuto</label>
          <div class="editor-toggle">
            <button class="active" id="btn-visuale" onclick="setEditor('visuale')">✏️ Visuale</button>
            <button id="btn-markdown" onclick="setEditor('markdown')">🔣 Markdown</button>
          </div>
          <div id="quill-box">
            <div class="vis-toolbar">
              <button onmousedown="event.preventDefault()" onclick="fmt('bold')" title="Grassetto"><b>B</b></button>
              <button onmousedown="event.preventDefault()" onclick="fmt('italic')" title="Corsivo"><i>I</i></button>
              <button onmousedown="event.preventDefault()" onclick="fmt('underline')" title="Sottolineato"><u>U</u></button>
              <button onmousedown="event.preventDefault()" onclick="fmt('strikeThrough')" title="Barrato"><s>S</s></button>
              <div class="sep"></div>
              <button onmousedown="event.preventDefault()" onclick="fmtBlock('h2')" title="Titolo">H2</button>
              <button onmousedown="event.preventDefault()" onclick="fmtBlock('h3')" title="Sottotitolo">H3</button>
              <button onmousedown="event.preventDefault()" onclick="fmtBlock('p')" title="Paragrafo">¶</button>
              <div class="sep"></div>
              <button onmousedown="event.preventDefault()" onclick="fmt('insertUnorderedList')" title="Lista">• Lista</button>
              <button onmousedown="event.preventDefault()" onclick="fmt('insertOrderedList')" title="Lista numerata">1. Lista</button>
              <div class="sep"></div>
              <button onmousedown="event.preventDefault()" onclick="inserisciLink()" title="Link">🔗</button>
              <button onmousedown="event.preventDefault()" onclick="inserisciImmagine()" title="Immagine nel testo">🖼</button>
              <button onmousedown="event.preventDefault()" onclick="fmt('removeFormat')" title="Rimuovi formattazione">✕ fmt</button>
            </div>
            <div id="vis-editor" class="vis-editor" contenteditable="true" spellcheck="true"></div>
          </div>
          <textarea class="md" id="corpo" placeholder="Scrivi in Markdown..." style="display:none"></textarea>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="pubblica()">🚀 Pubblica</button>
          <button class="btn btn-secondary" onclick="salvaBozza()">💾 Salva bozza</button>
          <button class="btn btn-secondary" onclick="nuovoArticolo()">✚ Nuovo</button>
          <button class="btn btn-secondary btn-sm" onclick="anteprima()">👁 Anteprima</button>
        </div>
        <div class="msg" id="msg-art"></div>
      </div>
      <div class="card" id="preview-box" style="display:none">
        <div class="card-title">Anteprima .md</div>
        <pre id="preview-content" style="font-size:12px;line-height:1.7;white-space:pre-wrap;background:#f8f8f8;padding:14px;border-radius:7px;overflow-x:auto"></pre>
      </div>
      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between">Pubblicati <button class="btn btn-secondary btn-sm" onclick="caricaLista()">↻ Aggiorna</button></div>
        <div id="lista-articoli"><span style="color:#bbb;font-size:13px">Clicca ↻ per caricare</span></div>
      </div>
      <div id="modal-img" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center">
        <div style="background:white;border-radius:12px;padding:28px 32px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)">
          <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:#1a1a2e">🖼 Inserisci immagine</div>
          <div class="field">
            <label>Carica dal PC</label>
            <label class="btn btn-secondary btn-sm" style="cursor:pointer">📁 Scegli file<input type="file" id="modal-img-file" accept="image/*" style="display:none" onchange="modalUploadImg(this)"></label>
            <div id="modal-img-progress" style="display:none;font-size:11px;color:#6c63ff;margin-top:6px">⏳ Caricamento...</div>
          </div>
          <div class="field">
            <label>oppure URL diretto</label>
            <input type="text" id="modal-img-url" placeholder="https://... o /assets/images/foto.jpg">
          </div>
          <div class="field">
            <label>Testo alternativo (alt)</label>
            <input type="text" id="modal-img-alt" placeholder="Descrizione immagine">
          </div>
          <div id="modal-img-preview" style="display:none;margin-bottom:12px"><img id="modal-img-preview-img" style="max-height:100px;border-radius:6px;border:1.5px solid #e8e8e8"></div>
          <div style="display:flex;gap:10px;justify-content:flex-end">
            <button class="btn btn-secondary" onclick="chiudiModalImg()">Annulla</button>
            <button class="btn btn-primary" onclick="confermaInserisciImg()">🖼 Inserisci</button>
          </div>
        </div>
      </div>

      <div id="modal-elimina" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center">
        <div style="background:white;border-radius:12px;padding:28px 32px;max-width:360px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)">
          <div style="font-size:16px;font-weight:700;margin-bottom:8px;color:#1a1a2e">🗑 Elimina articolo</div>
          <div style="font-size:13px;color:#666;margin-bottom:20px">Sicuro di voler eliminare <strong id="modal-nome-art"></strong>? L'operazione non è reversibile.</div>
          <div style="display:flex;gap:10px;justify-content:flex-end">
            <button class="btn btn-secondary" onclick="chiudiModal()">Annulla</button>
            <button class="btn btn-danger" onclick="confermaElimina()">🗑 Elimina</button>
          </div>
        </div>
      </div>
    </div>

    <!-- BOZZE -->
    <div class="page" id="page-bozze">
      <div class="page-title">📋 Bozze</div>
      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between">Bozze salvate <button class="btn btn-secondary btn-sm" onclick="caricaBozze()">↻ Aggiorna</button></div>
        <div id="lista-bozze"><span style="color:#bbb;font-size:13px">Clicca ↻ per caricare</span></div>
      </div>
    </div>

    <!-- IMPOSTAZIONI SITO -->
    <div class="page" id="page-sito">
      <div class="page-title">⚙️ Impostazioni sito</div>
      <div class="card">
        <div class="card-title">Identità</div>
        <div class="field"><label>Titolo sito</label><input type="text" id="cfg-title" placeholder="Il mio sito"></div>
        <div class="field"><label>Descrizione</label><input type="text" id="cfg-desc" placeholder="Descrizione breve per Google"></div>
        <div class="field"><label>URL sito</label><input type="text" id="cfg-url" placeholder="https://..."></div>
      </div>
      <div class="card">
        <div class="card-title">Autore</div>
        <div class="grid2">
          <div class="field"><label>Nome</label><input type="text" id="cfg-author" placeholder="Nome Cognome"></div>
          <div class="field"><label>Bio</label><input type="text" id="cfg-bio" placeholder="Una frase su di te"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Twitter</label><input type="text" id="cfg-twitter" placeholder="@username"></div>
          <div class="field"><label>GitHub</label><input type="text" id="cfg-github" placeholder="username"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Aspetto</div>
        <label style="margin-bottom:8px;display:block">Skin tema</label>
        <div class="skin-grid" id="skin-grid"></div>
      </div>
      <div class="btn-group" style="margin-top:4px">
        <button class="btn btn-primary" onclick="salvaConfig()">💾 Salva impostazioni</button>
      </div>
      <div class="msg" id="msg-sito"></div>
    </div>

    <!-- PAGINE -->
    <div class="page" id="page-pagine">
      <div class="page-title">📄 Pagine</div>
      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between">Pagine del sito <div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="nuovaPagina()">✚ Nuova pagina</button><button class="btn btn-secondary btn-sm" onclick="caricaPagine()">↻ Aggiorna</button></div></div>
        <div id="lista-pagine"><span style="color:#bbb;font-size:13px">Clicca ↻ per caricare</span></div>
      </div>
      <div class="card" id="editor-pagina" style="display:none">
        <div class="card-title">Modifica: <span id="nome-pagina" style="color:#6c63ff;text-transform:none"></span></div>
        <div class="field"><label>Titolo</label><input type="text" id="pag-titolo"></div>
        <div class="field"><label>Permalink (es. /contatti/)</label><input type="text" id="pag-permalink" placeholder="/nome-pagina/"></div>
        <div class="field"><label>Contenuto (Markdown)</label><textarea class="sm" id="pag-corpo"></textarea></div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="salvaPagina()">💾 Salva</button>
          <button class="btn btn-secondary" onclick="chiudiPagina()">✕ Annulla</button>
        </div>
        <div class="msg" id="msg-pag"></div>
      </div>
    </div>

    <!-- MENU -->
    <div class="page" id="page-menu">
      <div class="page-title">🧭 Menu</div>
      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between">Voci menu <button class="btn btn-secondary btn-sm" onclick="caricaMenu()">↻ Aggiorna</button></div>
        <div id="lista-menu"><span style="color:#bbb;font-size:13px">Clicca ↻ per caricare</span></div>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f0f0f0">
          <div class="grid2">
            <div class="field"><label>Nome</label><input type="text" id="menu-nome" placeholder="es. Contatti"></div>
            <div class="field"><label>URL</label><input type="text" id="menu-url" placeholder="es. /contatti/"></div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="aggiungiVoce()">+ Aggiungi voce</button>
        </div>
        <div class="btn-group" style="margin-top:12px">
          <button class="btn btn-primary" onclick="salvaMenu()">💾 Salva menu</button>
        </div>
        <div class="msg" id="msg-menu"></div>
      </div>
    </div>

    <!-- CATEGORIE -->
    <div class="page" id="page-categorie">
      <div class="page-title">🗂 Categorie</div>
      <div class="card">
        <div id="lista-categorie"></div>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f0f0f0">
          <div class="field"><label>Nome nuova categoria</label><input type="text" id="cat-nome" placeholder="es. Lifestyle"></div>
          <button class="btn btn-secondary btn-sm" onclick="aggiungiCategoria()">+ Aggiungi</button>
        </div>
        <div class="btn-group" style="margin-top:12px">
          <button class="btn btn-primary" onclick="salvaCategorie()">💾 Salva categorie</button>
        </div>
        <div class="msg" id="msg-cat"></div>
      </div>
    </div>

    <!-- TOKEN -->
    <div class="page" id="page-token">
      <div class="page-title">🔑 Token GitHub</div>
      <div class="card">
        <div class="field">

          </div>

        <div style="margin-top:14px;font-size:12px;color:#aaa">Il token è salvato solo nel tuo browser. <a href="https://github.com/settings/tokens/new?scopes=repo&description=CMS+Jekyll" target="_blank" style="color:#6c63ff">Crea nuovo token ↗</a></div>
      </div>

</div>

<script>
const REPO='cialdecompatibili-netizen/cialdecompatibili-netizen.github.io';
let _categorie=[];let _catSha=null;
let _menuVoci=[];let _menuSha=null;
let _paginaPath='';let _paginaSha='';

// EDITOR VISUALE
let _editorMode='visuale';
function initQuill(){} // compatibilità — non serve più
function fmt(cmd){document.getElementById('vis-editor').focus();document.execCommand(cmd,false,null);}
function fmtBlock(tag){document.getElementById('vis-editor').focus();document.execCommand('formatBlock',false,tag);}
function inserisciLink(){
  const url=prompt('URL del link:');if(!url)return;
  const testo=prompt('Testo del link:','');
  document.getElementById('vis-editor').focus();
  if(testo)document.execCommand('insertHTML',false,`<a href="${url}">${testo}</a>`);
  else document.execCommand('createLink',false,url);
}
function setEditor(mode){
  _editorMode=mode;
  document.getElementById('btn-visuale').classList.toggle('active',mode==='visuale');
  document.getElementById('btn-markdown').classList.toggle('active',mode==='markdown');
  if(mode==='visuale'){
    const md=document.getElementById('corpo').value;
    document.getElementById('vis-editor').innerHTML=mdToHtml(md);
    document.getElementById('quill-box').style.display='block';
    document.getElementById('corpo').style.display='none';
  } else {
    const html=document.getElementById('vis-editor').innerHTML;
    document.getElementById('corpo').value=htmlToMd(html);
    document.getElementById('quill-box').style.display='none';
    document.getElementById('corpo').style.display='block';
  }
}
function getCorpo(){
  if(_editorMode==='visuale')return htmlToMd(document.getElementById('vis-editor').innerHTML);
  return document.getElementById('corpo').value;
}
function setCorpo(md){
  document.getElementById('corpo').value=md;
  document.getElementById('vis-editor').innerHTML=mdToHtml(md);
}
function htmlToMd(html){
  return html
    .replace(/<img[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*>/gi,'![$2]($1)\n')
    .replace(/<img[^>]*src="([^"]*)"[^>]*>/gi,'![]($1)\n')
    .replace(/<h1[^>]*>(.*?)<\/h1>/gi,'# $1\n')
    .replace(/<h2[^>]*>(.*?)<\/h2>/gi,'## $1\n')
    .replace(/<h3[^>]*>(.*?)<\/h3>/gi,'### $1\n')
    .replace(/<strong[^>]*>(.*?)<\/strong>/gi,'**$1**')
    .replace(/<b[^>]*>(.*?)<\/b>/gi,'**$1**')
    .replace(/<em[^>]*>(.*?)<\/em>/gi,'*$1*')
    .replace(/<i[^>]*>(.*?)<\/i>/gi,'*$1*')
    .replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi,'[$2]($1)')
    .replace(/<li[^>]*>(.*?)<\/li>/gi,'- $1\n')
    .replace(/<\/?(ul|ol|p|br)[^>]*>/gi,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/\n{3,}/g,'\n\n').trim();
}
function mdToHtml(md){
  return md
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;height:auto;border-radius:6px;margin:8px 0">')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n/g,'<br>');
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}
function showPageById(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>{if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+id+"'"))b.classList.add('active');});
}

// DASHBOARD
async function caricaDashboard(){
  try{
    const [rp,rb,rpg]=await Promise.all([ghGet('_posts'),ghGet('_drafts'),ghGet('_pages')]);
    if(rp.ok){const d=await rp.json();document.getElementById('stat-art').textContent=Array.isArray(d)?d.length:0;}
    if(rb.ok){const d=await rb.json();document.getElementById('stat-boz').textContent=Array.isArray(d)?d.length:0;}

          <button class="btn btn-secondary btn-sm" onclick="modificaArticolo('${f.path}');showPageById('articoli')">✏️ Modifica</button>

// BOZZE
async function caricaBozze(){
  document.getElementById('lista-bozze').innerHTML='<span style="color:#bbb;font-size:13px">⏳ Caricamento...</span>';
  const res=await ghGet('_drafts');
  if(!res.ok){document.getElementById('lista-bozze').innerHTML='<span style="color:#bbb;font-size:13px">Nessuna bozza</span>';return;}
  const files=await res.json();
  if(!files.length){document.getElementById('lista-bozze').innerHTML='<span style="color:#bbb;font-size:13px">Nessuna bozza</span>';return;}
  document.getElementById('lista-bozze').innerHTML=files.reverse().map(f=>`
    <div class="list-row">
      <span>${f.name.replace(/\.md$/,'')} <span class="draft-badge">BOZZA</span></span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="modificaBozza('${f.path}','${f.sha}')">✏️ Modifica</button>
        <button class="btn btn-primary btn-sm" onclick="pubblicaBozza('${f.path}','${f.sha}','${f.name}')">🚀 Pubblica</button>
        <button class="btn btn-danger btn-sm" onclick="eliminaBozza('${f.path}','${f.sha}','${f.name}')">🗑</button>
      </div>
    </div>`).join('');
}
async function salvaBozza(){
  if(!tok())return showMsg('msg-art','⚠️ Token mancante!','err');
  const titolo=document.getElementById('titolo').value.trim();
  if(!titolo)return showMsg('msg-art','⚠️ Inserisci un titolo!','err');
  const data=document.getElementById('data').value;
  const nome=`${data}-${slugify(titolo)}.md`;
  const path=`_drafts/${nome}`;
  // controlla se esiste già
  let sha=null;
  try{const c=await ghGet(path);if(c.ok){const d=await c.json();if(d&&typeof d.sha==='string')sha=d.sha;}}catch(e){}
  const body={message:`Bozza: ${titolo}`,content:enc(buildMd())};
  if(sha)body.sha=sha;
  showMsg('msg-art','⏳ Salvataggio bozza...','');
  const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:'PUT',headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  const json=await res.json();
  if(res.ok)showMsg('msg-art','✅ Bozza salvata in _drafts/','ok');
  else showMsg('msg-art','❌ '+json.message,'err');
}
async function modificaBozza(path,sha){
  showPageById('articoli');
  const res=await ghGet(path);const data=await res.json();
  const content=dec(data.content);
  const fm=content.match(/^---\n([\s\S]*?)\n---/);
  const body=content.replace(/^---[\s\S]*?---\n\n?/,'');
  const get=(k)=>{const m=(fm?fm[1]:'').match(new RegExp(`${k}:\\s*"?([^"\\n]+)"?`));return m?m[1].trim():'';}
  document.getElementById('titolo').value=get('title');
  document.getElementById('data').value=get('date');
  document.getElementById('excerpt').value=get('excerpt');
  document.getElementById('teaser').value=get('teaser')||'';
  const catM=(fm?fm[1]:'').match(/categories:\n\s*-\s*(.+)/);
  if(catM)document.getElementById('categorie').value=catM[1].trim();
  setCorpo(body);
  window._editSha=data.sha;window._editPath=path;
  showMsg('msg-art','📋 Bozza caricata — modifica e pubblica o risalva.','ok');
  window.scrollTo({top:0,behavior:'smooth'});
}
async function pubblicaBozza(path,sha,nome){
  const res=await ghGet(path);const data=await res.json();
  const content=dec(data.content);
  // sposta in _posts
  const newPath=`_posts/${nome}`;
  let newSha=null;
  try{const c=await ghGet(newPath);if(c.ok){const d=await c.json();if(d&&typeof d.sha==='string')newSha=d.sha;}}catch(e){}
  const putBody={message:`Pubblica: ${nome}`,content:enc(content)};
  if(newSha)putBody.sha=newSha;
  const res2=await fetch(`https://api.github.com/repos/${REPO}/contents/${newPath}`,{method:'PUT',headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},body:JSON.stringify(putBody)});
  if(!res2.ok){const j=await res2.json();alert('Errore: '+j.message);return;}
  // elimina la bozza
  await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:'DELETE',headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},body:JSON.stringify({message:`Elimina bozza: ${nome}`,sha})});
  caricaBozze();
  alert('✅ Articolo pubblicato!');
}
async function eliminaBozza(path,sha,nome){
  if(!confirm(`Eliminare la bozza "${nome}"?`))return;
  const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:'DELETE',headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},body:JSON.stringify({message:`Elimina bozza: ${nome}`,sha})});
  if(res.ok)caricaBozze();
  else alert('Errore eliminazione');
}

// IMPOSTAZIONI SITO
const SKINS=['default','dark','mint','sunrise','aqua','neon','plum','dirt','air','contrast'];
let _configSha=null;let _configRaw='';let _skinAttuale='default';
function renderSkins(attuale){
  _skinAttuale=attuale||'default';
  document.getElementById('skin-grid').innerHTML=SKINS.map(s=>`
    <div class="skin-opt${s===_skinAttuale?' active':''}" onclick="scegliSkin('${s}')">${s}</div>`).join('');
}
function scegliSkin(s){
  _skinAttuale=s;
  document.querySelectorAll('.skin-opt').forEach(el=>el.classList.toggle('active',el.textContent===s));
}
async function caricaConfig(){
  const res=await ghGet('_config.yml');
  if(!res.ok)return;
  const d=await res.json();_configSha=d.sha;_configRaw=dec(d.content);
  const get=(k)=>{const m=_configRaw.match(new RegExp(`^${k}:\\s*(.+)$`,'m'));return m?m[1].trim().replace(/^"|"$/g,''):'';}
  document.getElementById('cfg-title').value=get('title');
  document.getElementById('cfg-desc').value=_configRaw.match(/description:\s*>-\s*\n\s*(.+)/)?_configRaw.match(/description:\s*>-\s*\n\s*(.+)/)[1].trim():get('description');
  document.getElementById('cfg-url').value=get('url');
  document.getElementById('cfg-author').value=get('name');
  document.getElementById('cfg-bio').value=get('bio');
  document.getElementById('cfg-twitter').value=get('twitter_username');
  document.getElementById('cfg-github').value=get('github_username');
  renderSkins(get('minimal_mistakes_skin'));
}
async function salvaConfig(){
  if(!tok())return showMsg('msg-sito','⚠️ Token mancante.','err');
  showMsg('msg-sito','⏳ Salvataggio...','');
  let cfg=_configRaw;
  const set=(k,v)=>{const re=new RegExp(`^(${k}:).*$`,'m');return cfg.match(re)?cfg.replace(re,`$1 ${v}`):cfg+`\n${k}: ${v}`;}
  cfg=set('title',`"${document.getElementById('cfg-title').value.trim()}"`);
  cfg=set('twitter_username',document.getElementById('cfg-twitter').value.trim());
  cfg=set('github_username',document.getElementById('cfg-github').value.trim());
  cfg=set('minimal_mistakes_skin',_skinAttuale);
  // autore
  cfg=cfg.replace(/(author:\s*\n\s*name\s*:\s*).*/,`$1"${document.getElementById('cfg-author').value.trim()}"`);
  cfg=cfg.replace(/(bio\s*:\s*").*(")/, `$1${document.getElementById('cfg-bio').value.trim()}$2`);
  // descrizione
  const desc=document.getElementById('cfg-desc').value.trim();
  cfg=cfg.replace(/description:\s*>-\s*\n\s*.+/,`description: "${desc}"`);
  const res=await ghPut('_config.yml','Aggiorna impostazioni sito',cfg,_configSha);
  const j=await res.json();
  if(res.ok){_configSha=j.content.sha;_configRaw=cfg;showMsg('msg-sito','✅ Salvato! Live in ~60s. (build Jekyll necessaria)','ok');}
  else showMsg('msg-sito','❌ '+j.message,'err');
}

// TOKEN
function salvaToken(){
  const t=document.getElementById('token-input').value.trim();
  if(!t)return;
  localStorage.setItem('gh_token',t);
  showMsg('msg-token','✅ Token salvato!','ok');
  document.getElementById('token-input').value='';
}
function cancellaToken(){localStorage.removeItem('gh_token');showMsg('msg-token','🗑 Token rimosso.','ok');}
function toggleToken(){const i=document.getElementById('token-input');i.type=i.type==='password'?'text':'password';}

// UTILS
function tok(){return localStorage.getItem('gh_token');}
function enc(s){return btoa(unescape(encodeURIComponent(s)));}
function dec(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))));}
function showMsg(id,txt,cls){const m=document.getElementById(id);m.textContent=txt;m.className='msg '+cls;}
async function ghGet(path){return fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{headers:{'Authorization':`token ${tok()}`}});}
async function ghPut(path,msg,content,sha){
  const body={message:msg,content:enc(content)};if(sha)body.sha=sha;
  return fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:'PUT',headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
}

// CATEGORIE
async function caricaCategorie(){
  const res=await ghGet('_data/categorie.json');
  if(res.ok){const d=await res.json();_catSha=d.sha;_categorie=JSON.parse(dec(d.content));}
  else _categorie=[{nome:'tecnica',descrizione:'Articoli tecnici, guide e tutorial'}];
  renderCategorie();renderSelect();
}
function renderCategorie(){
  const el=document.getElementById('lista-categorie');
  el.innerHTML=_categorie.map((c,i)=>`
    <div class="cat-row">
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <input type="text" value="${c.nome}" onchange="_categorie[${i}].nome=this.value;renderSelect()" style="font-weight:600;flex:1">
        <button class="btn btn-danger btn-sm" onclick="_categorie.splice(${i},1);renderCategorie();renderSelect()">🗑</button>
      </div>
      <input type="text" value="${c.descrizione||''}" placeholder="Descrizione..." onchange="_categorie[${i}].descrizione=this.value" style="font-size:12px">
    </div>`).join('');
}
function renderSelect(){
  const sel=document.getElementById('categorie');const cur=sel.value;
  sel.innerHTML='<option value="">— Seleziona —</option>';
  _categorie.forEach(c=>{const o=document.createElement('option');o.value=c.nome;o.textContent=c.nome;if(c.nome===cur)o.selected=true;sel.appendChild(o);});
}
function aggiungiCategoria(){
  const nome=document.getElementById('cat-nome').value.trim();if(!nome)return;
  if(!_categorie.find(c=>c.nome===nome))_categorie.push({nome,descrizione:''});
  document.getElementById('cat-nome').value='';renderCategorie();renderSelect();
}
async function salvaCategorie(){
  if(!tok())return showMsg('msg-cat','⚠️ Token mancante.','err');
  showMsg('msg-cat','⏳ Salvataggio...','');
  const res=await ghPut('_data/categorie.json','Aggiorna categorie',JSON.stringify(_categorie,null,2),_catSha);
  const j=await res.json();
  if(res.ok){_catSha=j.content.sha;showMsg('msg-cat','✅ Categorie salvate!','ok');}
  else showMsg('msg-cat','❌ '+j.message,'err');
}

// MENU
async function caricaMenu(){
  const res=await ghGet('_data/navigation.yml');
  if(!res.ok)return showMsg('msg-menu','❌ Errore caricamento.','err');
  const d=await res.json();_menuSha=d.sha;
  const yaml=dec(d.content);_menuVoci=[];
  let titolo='';
  for(const line of yaml.split('\n')){
    const t=line.match(/^\s+-\s+title:\s+"?([^"]+)"?/);
    const u=line.match(/^\s+url:\s+(.+)/);
    if(t)titolo=t[1].trim();
    if(u&&titolo){_menuVoci.push({title:titolo,url:u[1].trim()});titolo='';}
  }
  renderMenu();
}
function renderMenu(){
  document.getElementById('lista-menu').innerHTML=_menuVoci.map((v,i)=>`
    <div class="menu-row">
      <input type="text" value="${v.title}" onchange="_menuVoci[${i}].title=this.value" placeholder="Nome">
      <input type="text" value="${v.url}" onchange="_menuVoci[${i}].url=this.value" placeholder="/url/" style="font-size:12px;color:#555">
      <button class="btn btn-danger btn-sm" onclick="_menuVoci.splice(${i},1);renderMenu()">🗑</button>
    </div>`).join('');
}
function aggiungiVoce(){
  const t=document.getElementById('menu-nome').value.trim();
  const u=document.getElementById('menu-url').value.trim();
  if(!t||!u)return;
  _menuVoci.push({title:t,url:u});
  document.getElementById('menu-nome').value='';document.getElementById('menu-url').value='';
  renderMenu();
}
async function salvaMenu(){
  if(!tok())return showMsg('msg-menu','⚠️ Token mancante.','err');
  showMsg('msg-menu','⏳ Salvataggio...','');
  let yaml='main:\n';_menuVoci.forEach(v=>{yaml+=`  - title: "${v.title}"\n    url: ${v.url}\n`;});
  const res=await ghPut('_data/navigation.yml','Aggiorna menu',yaml,_menuSha);
  const j=await res.json();
  if(res.ok){_menuSha=j.content.sha;showMsg('msg-menu','✅ Menu salvato! Live in ~60s.','ok');}
  else showMsg('msg-menu','❌ '+j.message,'err');
}

// PAGINE
async function caricaPagine(){
  if(!tok())return;
  const res=await ghGet('_pages');if(!res.ok)return;
  const files=await res.json();
  document.getElementById('lista-pagine').innerHTML=files.map(f=>`
    <div class="list-row">
      <span>${f.name.replace(/\.md$/,'')}</span>
      <button class="btn btn-secondary btn-sm" onclick="modificaPagina('${f.path}','${f.sha}')">✏️ Modifica</button>
    </div>`).join('');
}
function nuovaPagina(){
  _paginaPath='';_paginaSha='';
  document.getElementById('pag-titolo').value='';
  document.getElementById('pag-permalink').value='';
  document.getElementById('pag-corpo').value='';
  document.getElementById('nome-pagina').textContent='Nuova pagina';
  document.getElementById('editor-pagina').style.display='block';
  document.getElementById('editor-pagina').scrollIntoView({behavior:'smooth'});
}
async function modificaPagina(path,sha){
  const res=await ghGet(path);const d=await res.json();
  const content=dec(d.content);
  const fm=content.match(/^---\n([\s\S]*?)\n---/);
  const corpo=content.replace(/^---[\s\S]*?---\n\n?/,'');
  const titleMatch=(fm?fm[1]:'').match(/title:\s*"?([^"\n]+)"?/);
  const permMatch=(fm?fm[1]:'').match(/permalink:\s*([^\n]+)/);
  _paginaPath=d.path||path;_paginaSha=d.sha;
  document.getElementById('pag-titolo').value=titleMatch?titleMatch[1].trim():'';
  document.getElementById('pag-permalink').value=permMatch?permMatch[1].trim():'';
  document.getElementById('pag-corpo').value=corpo;
  document.getElementById('nome-pagina').textContent=path.split('/').pop();
  document.getElementById('editor-pagina').style.display='block';
  document.getElementById('editor-pagina').scrollIntoView({behavior:'smooth'});
}
async function salvaPagina(){
  if(!tok())return showMsg('msg-pag','⚠️ Token mancante.','err');
  const titolo=document.getElementById('pag-titolo').value.trim();
  const corpo=document.getElementById('pag-corpo').value;
  const permalink=document.getElementById('pag-permalink').value.trim();
  let filePath=_paginaPath;
  if(!filePath){
    if(!titolo)return showMsg('msg-pag','⚠️ Inserisci un titolo.','err');
    const slug=titolo.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    filePath=`_pages/${slug}.md`;
  }
  const perm=permalink||('/'+filePath.split('/').pop().replace('.md','').replace(/^.*_pages\//,'')+'/');
  const content=`---\nlayout: single\ntitle: "${titolo}"\npermalink: ${perm}\nauthor_profile: true\n---\n\n${corpo}`;
  showMsg('msg-pag','⏳ Salvataggio...','');
  const res=await ghPut(filePath,`${_paginaSha?'Aggiorna':'Nuova'} pagina: ${titolo}`,content,_paginaSha||null);
  const j=await res.json();
  if(res.ok){_paginaPath=filePath;_paginaSha=j.content.sha;showMsg('msg-pag','✅ Salvata! Live in ~60s.','ok');caricaPagine();}
  else showMsg('msg-pag','❌ '+j.message,'err');
}
function chiudiPagina(){document.getElementById('editor-pagina').style.display='none';}

// ELIMINA ARTICOLO
let _eliminaPath=null;let _eliminaSha=null;
function chiediElimina(path,sha,nome){
  _eliminaPath=path;_eliminaSha=sha;
  document.getElementById('modal-nome-art').textContent=nome;
  const m=document.getElementById('modal-elimina');
  m.style.display='flex';
}
function chiudiModal(){
  document.getElementById('modal-elimina').style.display='none';
  _eliminaPath=null;_eliminaSha=null;
}
async function confermaElimina(){
  if(!_eliminaPath||!_eliminaSha)return;
  chiudiModal();
  showMsg('msg-art','⏳ Eliminazione...','');
  const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${_eliminaPath}`,{
    method:'DELETE',
    headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},
    body:JSON.stringify({message:'Elimina articolo',sha:_eliminaSha})
  });
  if(res.ok){showMsg('msg-art','✅ Articolo eliminato!','ok');caricaLista();}
  else{const j=await res.json();showMsg('msg-art','❌ '+j.message,'err');}
}

// IMMAGINE NELL'EDITOR
let _savedRange=null;
function inserisciImmagine(){
  const sel=window.getSelection();
  if(sel.rangeCount)_savedRange=sel.getRangeAt(0).cloneRange();
  document.getElementById('modal-img-url').value='';
  document.getElementById('modal-img-alt').value='';
  document.getElementById('modal-img-preview').style.display='none';
  document.getElementById('modal-img-progress').style.display='none';
  document.getElementById('modal-img-file').value='';
  document.getElementById('modal-img').style.display='flex';
}
function chiudiModalImg(){
  document.getElementById('modal-img').style.display='none';
}
async function modalUploadImg(input){
  if(!tok()){alert('Token mancante');return;}
  const file=input.files[0];if(!file)return;
  document.getElementById('modal-img-progress').style.display='block';
  const reader=new FileReader();
  reader.onload=async function(e){
    const base64=e.target.result.split(',')[1];
    const nome=file.name.replace(/[^a-zA-Z0-9._-]/g,'-').toLowerCase();
    const path=`assets/images/${nome}`;
    let sha=null;
    try{const check=await ghGet(path);if(check.ok){const d=await check.json();if(d&&typeof d.sha==='string')sha=d.sha;}}catch(err){}
    const payload={message:`Upload immagine: ${nome}`,content:base64};
    if(sha)payload.sha=sha;
    const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{
      method:'PUT',headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    document.getElementById('modal-img-progress').style.display='none';
    if(res.ok){
      const url=`/assets/images/${nome}`;
      document.getElementById('modal-img-url').value=url;
      document.getElementById('modal-img-preview-img').src=e.target.result;
      document.getElementById('modal-img-preview').style.display='block';
      if(!document.getElementById('modal-img-alt').value)
        document.getElementById('modal-img-alt').value=nome.replace(/\.[^.]+$/,'').replace(/-/g,' ');
    }else{
      const j=await res.json();alert('Upload fallito: '+j.message);
    }
  };
  input.value='';
  reader.readAsDataURL(file);
}
function confermaInserisciImg(){
  const url=document.getElementById('modal-img-url').value.trim();
  if(!url){alert('Inserisci un URL o carica un file.');return;}
  const alt=document.getElementById('modal-img-alt').value.trim()||'immagine';
  const editor=document.getElementById('vis-editor');
  if(_editorMode==='visuale'){
    editor.focus();
    if(_savedRange){
      const sel=window.getSelection();
      sel.removeAllRanges();
      sel.addRange(_savedRange);
    }
    document.execCommand('insertHTML',false,`<img src="${url}" alt="${alt}" style="max-width:100%;height:auto;border-radius:6px;margin:8px 0">`);
  } else {
    const ta=document.getElementById('corpo');
    const pos=ta.selectionStart;
    const md=`\n![${alt}](${url})\n`;
    ta.value=ta.value.slice(0,pos)+md+ta.value.slice(pos);
  }
  chiudiModalImg();
}

// UPLOAD IMMAGINE TEASER
async function uploadImmagine(input){
  if(!tok())return showMsg('msg-art','⚠️ Token mancante per upload.','err');
  const file=input.files[0];if(!file)return;
  document.getElementById('upload-progress').style.display='block';
  document.getElementById('upload-preview').style.display='none';
  const reader=new FileReader();
  reader.onload=async function(e){
    const base64=e.target.result.split(',')[1];
    const nome=file.name.replace(/[^a-zA-Z0-9._-]/g,'-').toLowerCase();
    const path=`assets/images/${nome}`;
    let sha=null;
    try{
      const check=await ghGet(path);
      if(check.ok){const d=await check.json();if(d&&typeof d.sha==='string')sha=d.sha;}
    }catch(err){}
    const payload={message:`Upload immagine: ${nome}`,content:base64};
    if(sha)payload.sha=sha;
    const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{
      method:'PUT',
      headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    document.getElementById('upload-progress').style.display='none';
    if(res.ok){
      const url=`/assets/images/${nome}`;
      document.getElementById('teaser').value=url;
      document.getElementById('upload-preview-img').src=e.target.result;
      document.getElementById('upload-preview').style.display='block';
      showMsg('msg-art',`✅ Immagine caricata: ${url}`,'ok');
    }else{
      const j=await res.json();
      showMsg('msg-art','❌ Upload fallito: '+j.message,'err');
    }
  };
  // resetta il file input così lo stesso file può essere ricaricato
  input.value='';
  reader.readAsDataURL(file);
}

function slugify(s){return s.toLowerCase().replace(/[àáâ]/g,'a').replace(/[èéê]/g,'e').replace(/[ìí]/g,'i').replace(/[òó]/g,'o').replace(/[ùú]/g,'u').replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-');}
function nuovoArticolo(){
  ['titolo','excerpt','teaser','tags','corpo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('vis-editor').innerHTML='';
  document.getElementById('categorie').value='';
  document.getElementById('data').value=new Date().toISOString().split('T')[0];
  document.getElementById('preview-box').style.display='none';
  document.getElementById('upload-preview').style.display='none';
  window._editSha=null;window._editPath=null;
  document.getElementById('msg-art').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
function buildMd(){
  const titolo=document.getElementById('titolo').value.trim();
  const data=document.getElementById('data').value;
  const cat=document.getElementById('categorie').value;
  const tags=document.getElementById('tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const excerpt=document.getElementById('excerpt').value.trim();
  const teaser=document.getElementById('teaser').value.trim();
  const corpo=getCorpo();
  let fm=`---\nlayout: single\ntitle: "${titolo}"\ndate: ${data}\n`;
  if(excerpt)fm+=`excerpt: "${excerpt}"\n`;
  if(teaser)fm+=`header:\n  teaser: "${teaser}"\n`;
  if(cat)fm+=`categories:\n  - ${cat}\n`;
  if(tags.length)fm+=`tags:\n${tags.map(t=>`  - ${t}`).join('\n')}\n`;
  return fm+`---\n\n${corpo}`;
}
function anteprima(){
  document.getElementById('preview-content').textContent=buildMd();
  document.getElementById('preview-box').style.display='block';
  document.getElementById('preview-box').scrollIntoView({behavior:'smooth'});
}
async function caricaLista(){
  if(!tok())return;
  document.getElementById('lista-articoli').innerHTML='<span style="color:#bbb;font-size:13px">⏳ Caricamento...</span>';
  const res=await ghGet('_posts');if(!res.ok)return;
  const files=await res.json();
  document.getElementById('lista-articoli').innerHTML=files.reverse().map(f=>`
    <div class="list-row">
      <span>${f.name.replace(/\.md$/,'')}</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="modificaArticolo('${f.path}')">✏️ Modifica</button>
        <button class="btn btn-danger btn-sm" onclick="chiediElimina('${f.path}','${f.sha}','${f.name}')">🗑</button>
      </div>
    </div>`).join('');
}
async function modificaArticolo(path){
  const res=await ghGet(path);const data=await res.json();
  const content=dec(data.content);
  const fm=content.match(/^---\n([\s\S]*?)\n---/);
  const body=content.replace(/^---[\s\S]*?---\n\n?/,'');
  const get=(k)=>{const m=(fm?fm[1]:'').match(new RegExp(`${k}:\\s*"?([^"\\n]+)"?`));return m?m[1].trim():'';}
  document.getElementById('titolo').value=get('title');
  document.getElementById('data').value=get('date');
  document.getElementById('excerpt').value=get('excerpt');
  document.getElementById('teaser').value=get('teaser')||'';
  const catM=(fm?fm[1]:'').match(/categories:\n\s*-\s*(.+)/);
  if(catM)document.getElementById('categorie').value=catM[1].trim();
  const tagsM=(fm?fm[1]:'').match(/tags:\n([\s\S]*?)(?=\n\w|\n---)/);
  if(tagsM)document.getElementById('tags').value=tagsM[1].replace(/\s*-\s*/g,'').trim().split('\n').join(', ');
  document.getElementById('corpo').value=body;
  setCorpo(body);
  window._editSha=data.sha;window._editPath=path;
  showMsg('msg-art','✏️ Articolo caricato — modifica e pubblica.','ok');
  window.scrollTo({top:0,behavior:'smooth'});
}
async function pubblica(){
  if(!tok())return showMsg('msg-art','⚠️ Token mancante!','err');
  const titolo=document.getElementById('titolo').value.trim();
  const cat=document.getElementById('categorie').value;
  const corpo=getCorpo();
  if(!titolo)return showMsg('msg-art','⚠️ Inserisci un titolo!','err');
  if(!cat)return showMsg('msg-art','⚠️ Seleziona una categoria!','err');
  if(!corpo)return showMsg('msg-art','⚠️ Scrivi il contenuto!','err');
  const data=document.getElementById('data').value;
  const filename=window._editPath||`_posts/${data}-${slugify(titolo)}.md`;
  const body={message:`${window._editSha?'Aggiorna':'Nuovo'} articolo: ${titolo}`,content:enc(buildMd())};
  if(window._editSha)body.sha=window._editSha;
  showMsg('msg-art','⏳ Pubblicazione...','');
  try{
    const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${filename}`,{method:'PUT',headers:{'Authorization':`token ${tok()}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const json=await res.json();
    if(res.ok){showMsg('msg-art','✅ Pubblicato! Live in ~60 secondi.','ok');window._editSha=null;window._editPath=null;caricaLista();}
    else showMsg('msg-art','❌ '+json.message,'err');
  }catch(e){showMsg('msg-art','❌ Errore di rete.','err');}
}

window.onload=function(){
  document.getElementById('data').value=new Date().toISOString().split('T')[0];
  initQuill();
  renderSkins('default');
  if(tok()){
    document.getElementById('token-input').value=tok();
    document.getElementById('token-input').placeholder='✅ Token presente';
    caricaCategorie();
    caricaLista();
    caricaPagine();
    caricaMenu();
    caricaDashboard();
    caricaConfig();
  }
};
</script>
